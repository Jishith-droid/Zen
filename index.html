<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ZEN playground</title>

<style>
  body {
    margin: 0;
    padding: 12px;
    font-family: monospace;
    background: #0f0f0f;
    color: #fff;
  }

  h1 {
    text-align: center;
    font-size: 20px;
    margin-bottom: 10px;
  }

  textarea {
    width: 100%;
    height: 180px;
    padding: 10px;
    font-size: 14px;
    box-sizing: border-box;
    font-family: monospace;
    border-radius: 8px;
    border: none;
    outline: none;
    resize: vertical;
  }

  button {
    width: 100%;
    margin-top: 10px;
    background: #1f1f1f;
    color: white;
    font-weight: bold;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #333;
  }

  button:hover {
    background: #2a2a2a;
  }

  details {
    margin-top: 12px;
    background: #151515;
    padding: 10px;
    border-radius: 8px;
  }

  summary {
    width: 100%;
    cursor: pointer;
    font-weight: bold;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .copy-btn {
    background: #333;
    border: none;
    color: white;
    padding: 4px 8px;
    font-size: 12px;
    border-radius: 5px;
    cursor: pointer;
  }

  pre, .tokens, .ast {
    white-space: pre-wrap;
    word-break: break-word;
    overflow-x: auto;
    margin-top: 10px;
    font-size: 13px;
  }

</style>
</head>

<body>

<h1>ZEN code editor</h1>

<textarea class="code" placeholder="Write ZEN code..."></textarea>

<button class="generate">Generate LLVM IR</button>

<!-- TOKENS -->
<details>
  <summary>
    <p>Tokens</p>
    <button class="copy-btn" data-copy="tokens">Copy</button>
  </summary>
  <div class="tokens"></div>
</details>

<!-- AST -->
<details>
  <summary>
    <p>AST</p>
    <button class="copy-btn" data-copy="ast">Copy</button>
  </summary>
  <div class="ast"></div>
</details>

<!-- LLVM -->
<details>
  <summary>
    <p>LLVM</p>
    <button class="copy-btn" data-copy="llvm">Copy</button>
  </summary>
  <pre><code id="llvm"></code></pre>
</details>
<button class="download-llvm">Download .ll</button>

<script type="module" defer src="index.js"></script>

</body>
</html>
